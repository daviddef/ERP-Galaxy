name: ERPGalaxy
options:
  bundleIdPrefix: com.daviddef
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: L9SAXP2E2W
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "16"

targets:
  ERPGalaxy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ERPGalaxy/Sources
      # Folder reference (not a group): preserves Web/vendor/d3.min.js so the
      # HTML's relative <script src="vendor/d3.min.js"> resolves inside the bundle.
      - path: ERPGalaxy/Resources/Web
        type: folder
      - path: ERPGalaxy/Resources/Data
        type: folder
      - path: ERPGalaxy/Resources/Assets.xcassets
    dependencies:
      - target: ERPGalaxyWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.erpgalaxy
        INFOPLIST_FILE: ERPGalaxy/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: false
        # "Designed for iPad" on Apple Silicon Macs -- no Catalyst work required.
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        ENABLE_USER_SCRIPT_SANDBOXING: true

  ERPGalaxyWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ERPGalaxyWidget
      # The widget needs the catalogue and the fate logic, so it compiles the
      # same TableStore rather than keeping a second copy that could drift.
      - path: ERPGalaxy/Sources/TableStore.swift
      - path: ERPGalaxy/Resources/Data
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daviddef.erpgalaxy.widget
        INFOPLIST_FILE: ERPGalaxyWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: true
